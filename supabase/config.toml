# Supabase local development configuration.
# `supabase start` requires Docker. On machines without Docker (e.g. this build
# environment) apply migrations against a provided project with:
#   supabase link --project-ref <ref> && supabase db push
project_id = "ngumbi-riders"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "10MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = false
enable_anonymous_sign_ins = false

# Owner uses email/password (spec §7.1).
[auth.email]
enable_signup = false
enable_confirmations = false
secure_password_change = false

# Riders authenticate by phone; we confirm phone server-side via the Admin API
# and never send SMS/OTP, so the SMS provider stays disabled.
[auth.sms]
enable_signup = false
enable_confirmations = false

[analytics]
enabled = false
